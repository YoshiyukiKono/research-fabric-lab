name: Publish Runtime Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "images/quantum-python-base/**"
      - ".github/workflows/publish-runtime-images.yml"

permissions:
  contents: read
  packages: write

jobs:
  quantum-python-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${OWNER_LC}/research-fabric-lab/quantum-python-base" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push quantum-python-base
        uses: docker/build-push-action@v6
        with:
          context: images/quantum-python-base
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
