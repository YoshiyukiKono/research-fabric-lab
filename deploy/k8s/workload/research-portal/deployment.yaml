apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-portal
  namespace: research
  labels:
    app.kubernetes.io/name: research-portal
    app.kubernetes.io/part-of: research-fabric-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: research-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: research-portal
        app.kubernetes.io/part-of: research-fabric-lab
    spec:
      serviceAccountName: research-portal
      containers:
        - name: streamlit
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              pip install streamlit openai kubernetes
              streamlit run /app/app.py \
                --server.address=0.0.0.0 \
                --server.port=8501 \
                --server.headless=true \
                --browser.gatherUsageStats=false
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
                  optional: true
            - name: OPENAI_MODEL
              value: gpt-5.5
          ports:
            - name: http
              containerPort: 8501
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: app
          configMap:
            name: research-portal-app
