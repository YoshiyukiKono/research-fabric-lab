apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: research-storage
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/YoshiyukiKono/research-fabric-lab.git
    targetRevision: main
    path: deploy/k8s/storage
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
