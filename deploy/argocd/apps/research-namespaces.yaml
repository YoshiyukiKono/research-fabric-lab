apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: research-namespaces
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YoshiyukiKono/research-fabric-lab.git
    targetRevision: main
    path: deploy/k8s/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
