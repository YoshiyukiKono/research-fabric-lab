apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: research-fabric-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_ME/research-fabric-lab.git
    targetRevision: main
    path: deploy/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
